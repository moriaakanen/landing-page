<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal NOVA — Ganti Kata Sandi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f4f0;--white:#fff;--navy:#0d2340;--navy2:#163358;--gold:#c8a84b;--gold-light:#f5edda;--text:#1a1a2e;--muted:#6b7280;--border:#e2ddd6;--border2:#d1ccc3;--red:#c0392b;--success:#1a7a4a;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--white);border:1px solid var(--border);border-radius:12px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 8px 32px rgba(13,35,64,.08)}
  .card-head{background:var(--navy);padding:28px 28px 20px;position:relative;overflow:hidden}
  .card-head::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(200,168,75,0.07) 1px,transparent 1px);background-size:22px 22px}
  .card-head-content{position:relative;z-index:2}
  .icon-wrap{width:52px;height:52px;background:rgba(200,168,75,.15);border:2px solid rgba(200,168,75,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
  .card-title{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:white;line-height:1.2;margin-bottom:4px}
  .card-title em{font-style:italic;color:var(--gold)}
  .card-subtitle{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6}
  .card-body{padding:24px 28px}
  .alert{padding:11px 13px;border-radius:7px;font-size:13px;line-height:1.5;margin-bottom:16px;display:none;gap:8px;align-items:flex-start}
  .alert.show{display:flex}
  .alert.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
  .alert.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
  .alert.info{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
  .form-group{margin-bottom:14px}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px}
  .form-label span{color:var(--red);margin-left:2px}
  .input-wrap{position:relative}
  .input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
  .form-input{width:100%;padding:11px 38px 11px 36px;background:var(--white);border:1.5px solid var(--border2);border-radius:7px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  .form-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,35,64,.07)}
  .form-input.error{border-color:var(--red)}
  .toggle-pass{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center}
  .toggle-pass:hover{color:var(--navy)}
  .error-msg{font-size:11px;color:var(--red);margin-top:4px;display:none}
  .error-msg.show{display:block}
  .strength-wrap{margin-top:6px;display:none}
  .strength-wrap.show{display:block}
  .strength-bars{display:flex;gap:4px;margin-bottom:4px}
  .strength-bar{flex:1;height:3px;background:var(--border);border-radius:100px;transition:background .3s}
  .strength-bar.weak{background:#ef4444}.strength-bar.medium{background:#f59e0b}.strength-bar.strong{background:var(--success)}
  .strength-label{font-size:11px;color:var(--muted)}
  .strength-label.weak{color:#ef4444}.strength-label.medium{color:#d97706}.strength-label.strong{color:var(--success)}
  .checklist{margin-top:10px;display:flex;flex-direction:column;gap:4px}
  .checklist-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);transition:color .2s}
  .checklist-item.ok{color:var(--success)}
  .checklist-item .check{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;flex-shrink:0}
  .checklist-item.ok .check{background:var(--success);border-color:var(--success);color:white}
  .btn-submit{width:100%;padding:11px;background:var(--navy);color:white;border:none;border-radius:7px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:4px;position:relative}
  .btn-submit:hover:not(:disabled){background:var(--navy2)}
  .btn-submit:disabled{opacity:.6;cursor:not-allowed}
  .btn-submit.loading{color:transparent}
  .btn-submit.loading::after{content:'';position:absolute;top:50%;left:50%;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;transform:translate(-50%,-50%);animation:spin .7s linear infinite}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  .logout-link{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--muted);text-decoration:none;transition:color .2s}
  .logout-link:hover{color:var(--navy)}
</style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <div class="card-head-content">
        <div class="icon-wrap">🔐</div>
        <div class="card-title">Ganti <em>Kata Sandi</em></div>
        <div class="card-subtitle" id="card-sub">Demi keamanan akun, silakan ganti kata sandi Anda.</div>
      </div>
    </div>
    <div class="card-body">
      <div id="page-alert" class="alert"><span id="page-alert-icon"></span><span id="page-alert-text"></span></div>

      <div class="form-group">
        <label class="form-label">Kata Sandi Lama <span>*</span></label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-input" id="inp-old" placeholder="Kata sandi saat ini" autocomplete="current-password">
          <button class="toggle-pass" type="button" onclick="togglePass('inp-old')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="error-msg" id="err-old">Kata sandi lama wajib diisi</span>
      </div>

      <div class="form-group">
        <label class="form-label">Kata Sandi Baru <span>*</span></label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" class="form-input" id="inp-new" placeholder="Kata sandi baru" oninput="checkStrength()" autocomplete="new-password">
          <button class="toggle-pass" type="button" onclick="togglePass('inp-new')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-wrap" id="strength-wrap">
          <div class="strength-bars">
            <div class="strength-bar" id="sb1"></div>
            <div class="strength-bar" id="sb2"></div>
            <div class="strength-bar" id="sb3"></div>
            <div class="strength-bar" id="sb4"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
          <div class="checklist">
            <div class="checklist-item" id="chk-len"><span class="check">✓</span> Minimal 8 karakter</div>
            <div class="checklist-item" id="chk-upper"><span class="check">✓</span> Ada huruf besar (A-Z)</div>
            <div class="checklist-item" id="chk-num"><span class="check">✓</span> Ada angka (0-9)</div>
          </div>
        </div>
        <span class="error-msg" id="err-new">Kata sandi baru wajib diisi (min. 8 karakter)</span>
      </div>

      <div class="form-group">
        <label class="form-label">Konfirmasi Kata Sandi Baru <span>*</span></label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" class="form-input" id="inp-confirm" placeholder="Ulangi kata sandi baru" autocomplete="new-password">
          <button class="toggle-pass" type="button" onclick="togglePass('inp-confirm')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="error-msg" id="err-confirm">Konfirmasi tidak cocok</span>
      </div>

      <button class="btn-submit" id="btn-submit" onclick="handleSubmit()">Simpan Kata Sandi Baru</button>
      <a class="logout-link" href="#" onclick="logout();return false">Keluar dari akun</a>
    </div>
  </div>

<script src="config.js"></script>
<script>
  let SESSION = null;
  try {
    SESSION = JSON.parse(localStorage.getItem('nova_user') || 'null');
    if (!SESSION || (SESSION.expires_at && Date.now() > SESSION.expires_at)) {
      localStorage.removeItem('nova_user'); window.location.replace('login.html');
    }
  } catch(e) { localStorage.removeItem('nova_user'); window.location.replace('login.html'); }

  if (SESSION && SESSION.must_change_password) {
    const sub = document.getElementById('card-sub');
    if (sub) sub.textContent = 'Login pertama Anda — wajib mengganti kata sandi default demi keamanan akun.';
  }

  function togglePass(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'text' ? 'password' : 'text';
  }

  function checkStrength() {
    const p = document.getElementById('inp-new').value;
    const wrap = document.getElementById('strength-wrap');
    if (!p) { wrap.classList.remove('show'); return; }
    wrap.classList.add('show');
    const checks = {
      len:   p.length >= 8,
      upper: /[A-Z]/.test(p),
      num:   /[0-9]/.test(p),
      lower: /[a-z]/.test(p),
      sym:   /[^A-Za-z0-9]/.test(p),
    };
    document.getElementById('chk-len').classList.toggle('ok', checks.len);
    document.getElementById('chk-upper').classList.toggle('ok', checks.upper);
    document.getElementById('chk-num').classList.toggle('ok', checks.num);

    const met = Object.values(checks).filter(Boolean).length;
    const bars = ['sb1','sb2','sb3','sb4'];
    const cls  = met<=2?'weak':met<=3?'medium':'strong';
    const txt  = met<=2?'Lemah':met<=3?'Sedang':'Kuat';
    bars.forEach((id,i)=>{ const el=document.getElementById(id); el.className='strength-bar'; if(met>=2&&i===0)el.classList.add(cls); if(met>=3&&i<=1)el.classList.add(cls); if(met>=4&&i<=2)el.classList.add(cls); if(met>=5&&i<=3)el.classList.add(cls); });
    const lbl=document.getElementById('strength-label'); lbl.className=`strength-label ${cls}`; lbl.textContent=`Kekuatan: ${txt}`;
  }

  function showAlert(msg, type='error') {
    document.getElementById('page-alert-icon').textContent = type==='success'?'✅':type==='info'?'💡':'⚠️';
    document.getElementById('page-alert-text').textContent = msg;
    document.getElementById('page-alert').className = `alert ${type} show`;
  }
  function clearAlert() { document.getElementById('page-alert').className = 'alert'; }
  function showFieldError(id, errId) {
    document.getElementById(id).classList.add('error');
    document.getElementById(errId).classList.add('show');
  }
  function clearErrors() {
    document.querySelectorAll('.error-msg').forEach(e=>e.classList.remove('show'));
    document.querySelectorAll('.form-input').forEach(i=>i.classList.remove('error'));
    clearAlert();
  }

  async function handleSubmit() {
    clearErrors();
    const oldPass = document.getElementById('inp-old').value;
    const newPass = document.getElementById('inp-new').value;
    const confirm = document.getElementById('inp-confirm').value;
    let valid = true;
    if (!oldPass) { showFieldError('inp-old','err-old'); valid=false; }
    if (!newPass || newPass.length < 8) { showFieldError('inp-new','err-new'); valid=false; }
    if (newPass !== confirm) { showFieldError('inp-confirm','err-confirm'); valid=false; }
    if (oldPass === newPass && oldPass) {
      showAlert('Kata sandi baru tidak boleh sama dengan kata sandi lama.', 'error');
      valid = false;
    }
    if (!valid) return;

    const btn = document.getElementById('btn-submit');
    btn.disabled = true; btn.classList.add('loading');

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/change_password`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          p_username: SESSION.username,
          p_old_password: oldPass,
          p_new_password: newPass
        })
      });
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { const err = await res.json(); msg = err.message || err.hint || msg; } catch(_) {}
        throw new Error(msg);
      }
      const result = await res.json().catch(()=>null);
      if (result === false) {
        showAlert('Kata sandi lama salah. Silakan periksa kembali.', 'error');
        btn.disabled=false; btn.classList.remove('loading');
        return;
      }

      // Update session
      SESSION.must_change_password = false;
      localStorage.setItem('nova_user', JSON.stringify(SESSION));

      showAlert('✅ Kata sandi berhasil diubah. Mengalihkan...', 'success');
      setTimeout(()=>{ window.location.replace('index.html'); }, 1200);

    } catch(e) {
      showAlert(`Gagal mengubah kata sandi: ${e.message}`, 'error');
      btn.disabled = false; btn.classList.remove('loading');
    }
  }

  function logout() {
    localStorage.removeItem('nova_user');
    window.location.replace('login.html');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
</script>
</body>
</html>
