<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal NOVA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --white: #ffffff;
    --navy: #0d2340;
    --navy2: #163358;
    --navy-light: #1e3f6e;
    --gold: #c8a84b;
    --gold-light: #f5edda;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e2ddd6;
    --border2: #d1ccc3;
    --success: #1a7a4a;
    --sidebar-w: 260px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{height:100%}
  body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;height:100%;display:flex;flex-direction:column;overflow-x:hidden}

  /* ── TOP BAR ── */
  .topbar{
    height:52px;
    background:var(--navy);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px 0 0;
    flex-shrink:0;
    position:sticky;top:0;z-index:200;
  }
  .topbar-brand{
    width:var(--sidebar-w);
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 20px;
    border-right:1px solid rgba(255,255,255,0.07);
    height:100%;
    flex-shrink:0;
  }
  .brand-emblem{
    width:30px;height:30px;
    background:var(--gold);
    border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;flex-shrink:0;
  }
  .brand-name{font-size:14px;font-weight:700;color:white;letter-spacing:0.5px;line-height:1}
  .brand-tag{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase}

  .topbar-right{display:flex;align-items:center;gap:14px}
  .topbar-time{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.3px}
  .topbar-user{display:flex;align-items:center;gap:8px}
  .topbar-avatar{
    width:30px;height:30px;
    background:var(--navy2);
    border:1.5px solid rgba(200,168,75,0.4);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:var(--gold);
    flex-shrink:0;
  }
  .topbar-username{font-size:13px;color:rgba(255,255,255,0.75);font-weight:500}
  .btn-logout{
    padding:6px 14px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.15);
    border-radius:5px;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:12px;color:rgba(255,255,255,0.5);
    cursor:pointer;transition:all 0.2s;
  }
  .btn-logout:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.9)}

  /* ── BODY LAYOUT ── */
  .layout{display:flex;flex:1;min-height:0}

  /* ── SIDEBAR ── */
  .sidebar{
    width:var(--sidebar-w);
    background:var(--white);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    flex-shrink:0;
    overflow-y:auto;
  }

  .sidebar-section-label{
    font-size:10px;font-weight:600;
    color:var(--muted);
    letter-spacing:1.5px;text-transform:uppercase;
    padding:20px 20px 8px;
  }

  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:10px 20px;
    font-size:13px;font-weight:500;color:var(--muted);
    cursor:pointer;
    border-radius:0;
    transition:background 0.15s,color 0.15s;
    border-left:3px solid transparent;
    text-decoration:none;
    user-select:none;
  }
  .nav-item:hover{background:var(--bg);color:var(--navy)}
  .nav-item.active{
    background:var(--gold-light);
    color:var(--navy);
    border-left-color:var(--gold);
    font-weight:600;
  }
  .nav-item-icon{
    width:28px;height:28px;
    border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;
    background:var(--bg);
    flex-shrink:0;
    transition:background 0.15s;
  }
  .nav-item.active .nav-item-icon{background:var(--gold-light)}
  .nav-item:hover .nav-item-icon{background:var(--border)}

  .sidebar-footer{
    margin-top:auto;
    padding:16px 20px;
    border-top:1px solid var(--border);
    font-size:11px;color:var(--muted);
    line-height:1.7;
  }
  .sidebar-footer strong{color:var(--navy);font-weight:600}

  /* ── MAIN CONTENT ── */
  .main{flex:1;overflow-y:auto;padding:36px 40px}

  /* ── PAGE HEADER ── */
  .page-header{margin-bottom:28px}
  .page-eyebrow{
    font-size:11px;font-weight:600;color:var(--gold);
    letter-spacing:2px;text-transform:uppercase;
    display:flex;align-items:center;gap:8px;margin-bottom:6px;
  }
  .page-eyebrow::before{content:'';width:16px;height:2px;background:var(--gold)}
  .page-title{
    font-family:'Fraunces',serif;
    font-size:clamp(24px,2.5vw,32px);
    font-weight:300;color:var(--navy);line-height:1.2;
  }
  .page-title em{font-style:italic;color:var(--gold)}
  .page-desc{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.7}

  /* ── PROFIL CARD ── */
  .profil-wrap{
    background:var(--white);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 1px 4px rgba(13,35,64,0.06);
  }
  .profil-banner{
    background:var(--navy);
    height:80px;
    position:relative;
    overflow:hidden;
  }
  .profil-banner::before{
    content:'';position:absolute;inset:0;
    background-image:radial-gradient(circle,rgba(200,168,75,0.08) 1px,transparent 1px);
    background-size:22px 22px;
  }
  .profil-banner::after{
    content:'';position:absolute;
    right:-40px;bottom:-40px;
    width:160px;height:160px;
    border:28px solid rgba(200,168,75,0.07);
    border-radius:50%;
  }

  .profil-identity{
    display:flex;align-items:flex-end;gap:16px;
    padding:0 28px;
    margin-top:-32px;
    margin-bottom:20px;
    position:relative;z-index:1;
  }
  .profil-avatar{
    width:68px;height:68px;
    border-radius:50%;
    background:var(--navy);
    border:3px solid var(--white);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:700;color:var(--gold);
    flex-shrink:0;
    box-shadow:0 2px 8px rgba(13,35,64,0.15);
  }
  .profil-namebox{padding-bottom:4px}
  .profil-nama{font-size:18px;font-weight:700;color:var(--navy);line-height:1.2}
  .profil-nip{font-size:12px;color:var(--muted);margin-top:2px}

  .profil-divider{height:1px;background:var(--border);margin:0 28px}

  /* Data grid */
  .profil-data{padding:24px 28px}
  .data-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:14px;
  }
  .data-field{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:14px 16px;
  }
  .data-field-label{
    font-size:10px;font-weight:600;
    color:var(--muted);
    letter-spacing:1px;text-transform:uppercase;
    margin-bottom:5px;
  }
  .data-field-val{
    font-size:14px;font-weight:600;color:var(--navy);
    line-height:1.4;
  }
  .data-field-val.empty{color:var(--muted);font-weight:400;font-style:italic}

  /* Full-width field */
  .data-field.full{grid-column:1/-1}

  /* Badge status */
  .status-badge{
    display:inline-flex;align-items:center;gap:5px;
    padding:3px 10px;border-radius:100px;
    font-size:11px;font-weight:600;
  }
  .status-badge.aktif{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
  .status-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

  /* ── SKELETON ── */
  .skel{
    background:linear-gradient(90deg,rgba(13,35,64,0.05) 25%,rgba(13,35,64,0.1) 50%,rgba(13,35,64,0.05) 75%);
    background-size:200% 100%;
    animation:shimmer 1.5s infinite;
    border-radius:6px;
  }
  @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

  /* ── ERROR STATE ── */
  .empty-state{
    padding:48px 28px;
    text-align:center;
  }
  .empty-icon{
    font-size:32px;margin-bottom:12px;
    opacity:0.4;
  }
  .empty-title{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px}
  .empty-desc{font-size:13px;color:var(--muted);line-height:1.7}

  /* ── FADE IN ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeUp 0.5s ease both}

  /* ── RESPONSIVE ── */
  @media(max-width:768px){
    :root{--sidebar-w:220px}
    .main{padding:24px 20px}
    .topbar-time{display:none}
  }
  @media(max-width:600px){
    .sidebar{position:fixed;left:-260px;top:52px;bottom:0;z-index:150;transition:left 0.25s ease;box-shadow:4px 0 20px rgba(13,35,64,0.12)}
    .sidebar.open{left:0}
    .layout{display:block}
    .main{padding:20px 16px}
    .menu-toggle{display:flex!important}
    .data-grid{grid-template-columns:1fr}
    .profil-identity{flex-direction:column;align-items:flex-start;margin-top:-20px;gap:12px}
  }
  .menu-toggle{
    display:none;
    align-items:center;justify-content:center;
    width:36px;height:36px;
    background:rgba(255,255,255,0.07);
    border:none;border-radius:5px;cursor:pointer;
    color:white;font-size:16px;margin-left:12px;
  }
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-emblem">🏛</div>
    <div>
      <div class="brand-name">PORTAL NOVA</div>
      <div class="brand-tag">Sistem Informasi Terpadu</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="topbar-time" id="topbar-time"></span>
    <div class="topbar-user">
      <div class="topbar-avatar" id="topbar-avatar">—</div>
      <span class="topbar-username" id="topbar-username">Pengguna</span>
    </div>
    <button class="btn-logout" onclick="logout()">Keluar</button>
    <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()">☰</button>
  </div>
</div>

<!-- ── BODY LAYOUT ── -->
<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-section-label">Menu Utama</div>

    <a class="nav-item active" data-page="profil">
      <div class="nav-item-icon">👤</div>
      Profil Saya
    </a>

    <div class="sidebar-footer">
      <strong>Portal NOVA</strong><br>
      Sistem Informasi Terpadu<br>
      © 2026 Pemerintah RI
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main" id="main-content">

    <!-- Page: Profil -->
    <div id="page-profil">
      <div class="page-header fade-in">
        <div class="page-eyebrow">Profil Saya</div>
        <h1 class="page-title">Data <em>Pribadi</em> Pegawai</h1>
        <p class="page-desc">Informasi data kepegawaian Anda yang tersimpan dalam sistem.</p>
      </div>

      <!-- Kartu profil -->
      <div class="profil-wrap fade-in" id="profil-card" style="animation-delay:0.1s">

        <!-- Skeleton awal -->
        <div class="profil-banner"></div>
        <div style="padding:0 28px;margin-top:-32px;margin-bottom:20px;display:flex;align-items:flex-end;gap:16px">
          <div class="skel" style="width:68px;height:68px;border-radius:50%;flex-shrink:0;border:3px solid var(--white)"></div>
          <div style="padding-bottom:8px;display:flex;flex-direction:column;gap:8px">
            <div class="skel" style="height:18px;width:200px"></div>
            <div class="skel" style="height:12px;width:130px"></div>
          </div>
        </div>
        <div style="height:1px;background:var(--border);margin:0 28px"></div>
        <div style="padding:24px 28px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px">
          <div class="skel" style="height:62px;border-radius:8px"></div>
          <div class="skel" style="height:62px;border-radius:8px"></div>
          <div class="skel" style="height:62px;border-radius:8px"></div>
          <div class="skel" style="height:62px;border-radius:8px"></div>
          <div class="skel" style="height:62px;border-radius:8px"></div>
          <div class="skel" style="height:62px;border-radius:8px"></div>
        </div>

      </div>
    </div>

  </main>
</div>

<script>
  const SUPABASE_URL = 'https://jsmmtqeoukkgugorrvmg.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzbW10cWVvdWtrZ3Vnb3Jydm1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTg2NzksImV4cCI6MjA5MTY3NDY3OX0.O03NscRcj4RcNx-P3j65hO7XXLRSkbyJcwpcArpqHBQ';

  /* ── SESSION ── */
  function checkSession() {
    try {
      const s = JSON.parse(localStorage.getItem('nova_user') || 'null');
      if (!s) { window.location.replace('login.html'); return null; }
      if (s.expires_at && Date.now() > s.expires_at) {
        localStorage.removeItem('nova_user');
        window.location.replace('login.html');
        return null;
      }
      if (s.must_change_password) {
        window.location.replace('ganti-password.html');
        return null;
      }
      return s;
    } catch(e) {
      localStorage.removeItem('nova_user');
      window.location.replace('login.html');
      return null;
    }
  }

  function logout() {
    localStorage.removeItem('nova_user');
    window.location.replace('login.html');
  }

  /* ── CLOCK ── */
  function updateClock() {
    document.getElementById('topbar-time').textContent =
      new Date().toLocaleString('id-ID', {
        weekday:'long', day:'numeric', month:'long',
        year:'numeric', hour:'2-digit', minute:'2-digit'
      });
  }
  updateClock(); setInterval(updateClock, 1000);

  /* ── TOPBAR USER ── */
  function setTopbarUser(session) {
    const name = session.full_name || session.username || 'Pengguna';
    const initials = name.split(' ').filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0, 2);
    document.getElementById('topbar-avatar').textContent = initials;
    document.getElementById('topbar-username').textContent = name;
  }

  /* ── FETCH DATA PEGAWAI ── */
  async function fetchProfil(userId) {
    const card = document.getElementById('profil-card');
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/data%20pegawai?id=eq.${encodeURIComponent(userId)}&select=*&limit=1`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      if (!res.ok) throw new Error('fetch-failed');
      const data = await res.json();

      if (!data || !data.length) {
        card.innerHTML = emptyState('Data Tidak Ditemukan', 'Data pegawai untuk akun ini belum tersedia. Hubungi administrator.');
        return;
      }

      renderProfil(card, data[0]);

    } catch(e) {
      card.innerHTML = emptyState('Gagal Memuat Data', 'Terjadi kesalahan saat mengambil data. Muat ulang halaman untuk mencoba kembali.');
    }
  }

  function emptyState(title, desc) {
    return `
      <div class="profil-banner"></div>
      <div class="empty-state">
        <div class="empty-icon">🗂</div>
        <div class="empty-title">${title}</div>
        <div class="empty-desc">${desc}</div>
      </div>`;
  }

  function field(label, value, full) {
    const val = value && String(value).trim() ? String(value).trim() : null;
    return `
      <div class="data-field${full ? ' full' : ''}">
        <div class="data-field-label">${label}</div>
        <div class="data-field-val${val ? '' : ' empty'}">${val || 'Tidak tersedia'}</div>
      </div>`;
  }

  function renderProfil(card, p) {
    const nama     = p['NAMA'] || '-';
    const nip      = p['NIP']  || '-';
    const initials = nama.split(' ').filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0, 2);

    card.innerHTML = `
      <div class="profil-banner"></div>

      <div class="profil-identity">
        <div class="profil-avatar">${initials}</div>
        <div class="profil-namebox">
          <div class="profil-nama">${nama}</div>
          <div class="profil-nip">NIP ${nip}</div>
        </div>
      </div>

      <div class="profil-divider"></div>

      <div class="profil-data">
        <div class="data-grid">
          ${field('Nama Lengkap', p['NAMA'], true)}
          ${field('NIP', p['NIP'])}
          ${field('Nomor Seri Karpeg', p['NOMOR SERI KARPEG'])}
          ${field('Tempat / Tanggal Lahir', p['TEMPAT/TANGGAL LAHIR'])}
          ${field('Jenis Kelamin', p['JENIS KELAMIN'])}
          ${field('Agama', p['AGAMA'])}
          ${field('Pendidikan Terakhir', p['PENDIDIKAN TERAKHIR'])}
          ${field('Unit Kerja', p['UNIT KERJA'])}
          ${field('Jabatan', p['JABATAN'])}
          ${field('Golongan / Ruang', p['GOLONGAN/RUANG'] || p['GOLONGAN'] || p['GOL/RUANG'])}
          ${field('TMT Golongan', p['TMT GOLONGAN'] || p['TMT GOL'])}
          ${field('Masa Kerja', p['MASA KERJA'])}
        </div>
      </div>`;
  }

  /* ── SIDEBAR TOGGLE (mobile) ── */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  /* ── INIT ── */
  function init() {
    const session = checkSession();
    if (!session) return;
    setTopbarUser(session);
    fetchProfil(session.id);
  }

  init();
</script>
</body>
</html>
