<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9201 - EoTQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,300;0,500;0,600;1,300;1,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--white:#fff;--navy:#0d2340;--navy2:#163358;--gold:#c8a84b;--gold-light:#f5edda;--gold-dark:#a78a3a;--text:#1a1a2e;--muted:#6b7280;--border:#e2ddd6;--border2:#d1ccc3;--red:#c0392b;--success:#1a7a4a;--blue:#1d4ed8;--sidebar-w:260px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}body{height:100%;display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden}button,input,select,textarea{font:inherit}.layout{display:flex;flex:1;min-height:0}.sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}.main{flex:1;overflow:auto;padding:32px 38px 56px}.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:20px}.page-eyebrow{font-size:11px;font-weight:800;color:var(--gold-dark);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:6px}.page-eyebrow::before{content:'';width:16px;height:2px;background:var(--gold)}.page-title{font-family:'Fraunces',serif;font-size:clamp(25px,2.8vw,34px);font-weight:300;color:var(--navy);line-height:1.15}.page-title em{font-style:italic;color:var(--gold);font-weight:400}.page-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-top:7px;max-width:760px}.alert{display:none;margin-bottom:16px;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.55}.alert.show{display:block}.alert.success{background:#ecfdf5;border:1px solid #a7f3d0;color:#047857}.alert.error{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}.alert.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.workspace{display:grid;grid-template-columns:minmax(300px,360px) minmax(0,1fr);gap:16px;align-items:start}.panel{background:var(--white);border:1px solid var(--border);border-radius:13px;box-shadow:0 2px 10px rgba(13,35,64,.045);overflow:hidden}.panel-head{background:var(--navy);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}.panel-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.9px;color:rgba(255,255,255,.76)}.panel-count{font-size:11px;color:rgba(255,255,255,.46);font-weight:700}.panel-body{padding:14px}.cycle-list{display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 360px);overflow:auto;padding-right:2px}.cycle-card{width:100%;border:1px solid var(--border);background:#fff;border-radius:11px;padding:12px;text-align:left;cursor:pointer;transition:background .15s,border-color .15s,box-shadow .15s}.cycle-card:hover{background:#faf9f6}.cycle-card.active{border-color:rgba(200,168,75,.75);background:#fff8e4;box-shadow:inset 3px 0 0 var(--gold)}.cycle-main{font-weight:900;color:var(--navy);font-size:13px;line-height:1.35}.cycle-sub{color:var(--muted);font-size:11px;line-height:1.55;margin-top:4px}.status{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;padding:4px 8px;font-size:10.5px;font-weight:900;margin-top:8px}.status::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}.status.open{background:#ecfdf5;color:#047857;border-color:#a7f3d0}.status.draft{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}.status.closed{background:#fffbeb;color:#92400e;border-color:#fde68a}.status.announced{background:var(--gold-light);color:var(--gold-dark);border-color:rgba(200,168,75,.5)}.status.archived{background:#f8fafc;color:#475569;border-color:#e2e8f0}
.form-section{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;background:linear-gradient(180deg,#fff,#fffdf8)}.section-title{font-size:11px;font-weight:900;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:12px}.section-title::before{content:'';width:18px;height:2px;background:var(--gold);border-radius:2px}.grid{display:grid;gap:10px}.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:1fr 1fr 1fr}.field label{display:block;font-size:10.5px;font-weight:900;letter-spacing:.55px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}.input,.select,.textarea{width:100%;border:1.5px solid var(--border2);border-radius:9px;background:#fff;color:var(--navy);outline:none;transition:border-color .15s,box-shadow .15s}.input,.select{height:40px;padding:8px 11px}.textarea{min-height:84px;padding:10px 11px;resize:vertical;line-height:1.5}.input:focus,.select:focus,.textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,35,64,.08)}.hint{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:6px}.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{border:1.5px solid var(--border2);border-radius:8px;background:#fff;color:var(--navy);font-weight:900;font-size:12.5px;padding:9px 13px;cursor:pointer;transition:background .15s,border-color .15s,transform .12s}.btn:hover:not(:disabled){border-color:var(--navy);background:#faf9f6;transform:translateY(-1px)}.btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}.btn.primary:hover:not(:disabled){background:var(--navy2)}.btn.gold{background:var(--gold);border-color:var(--gold);color:var(--navy)}.btn.danger{color:#b91c1c;border-color:#fecaca}.btn.danger:hover{background:#fef2f2;border-color:#ef4444}.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.nominee-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}.nominee-card{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff;display:flex;gap:10px;align-items:flex-start}.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--gold);display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:800;flex-shrink:0}.nominee-name{font-weight:900;color:var(--navy);font-size:13px;line-height:1.35}.nominee-nip{font-size:11px;color:var(--muted);margin-top:2px}.nominee-note{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:7px}.nominee-actions{margin-left:auto}.icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--red);font-weight:900;cursor:pointer}
.question-list{display:flex;flex-direction:column;gap:10px}.question-card{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff}.question-top{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}.question-text{font-weight:900;color:var(--navy);font-size:13px;line-height:1.45}.question-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;background:#f8fafc;border:1px solid #e2e8f0;color:#475569;font-size:10.5px;font-weight:900}.chip.gold{background:var(--gold-light);border-color:rgba(200,168,75,.4);color:var(--gold-dark)}.question-options{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.55}.leaderboard{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.rank-card{border:1px solid var(--border);border-radius:14px;padding:14px;background:linear-gradient(180deg,#fff,#faf9f4);min-width:0}.rank-card:first-child{background:linear-gradient(180deg,#fff8df,#fff);border-color:rgba(200,168,75,.55)}.rank-no{font-family:'Fraunces',serif;font-size:28px;color:var(--gold-dark);font-weight:600}.rank-name{font-weight:900;color:var(--navy);line-height:1.35;margin-top:4px}.rank-score{font-size:12px;color:var(--muted);margin-top:7px}.empty{padding:26px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6;border:1px dashed var(--border2);border-radius:12px;background:#fff}.divider{height:1px;background:var(--border);margin:12px 0}
@media(max-width:1100px){.workspace{grid-template-columns:1fr}.cycle-list{max-height:none}.grid.two,.grid.three{grid-template-columns:1fr}.leaderboard{grid-template-columns:1fr}}@media(max-width:768px){:root{--sidebar-w:220px}.main{padding:24px 16px}.page-header{display:block}}
</style>
</head>
<body>
<div id="topbar-mount"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar" data-active="eotq"></aside>
  <main class="main">
    <header class="page-header">
      <div>
        <div class="page-eyebrow">Administrasi</div>
        <h1 class="page-title">Employee <em>of the Quarter</em></h1>
        <p class="page-desc">Susun periode penghargaan, pilih nominasi pegawai terbaik, buat pertanyaan berbobot, dan pantau hasil penilaian seluruh pegawai.</p>
      </div>
      <button class="btn gold" type="button" onclick="newCycle()">+ Periode Baru</button>
    </header>
    <div class="alert" id="alert"></div>
    <section class="workspace">
      <aside class="panel">
        <div class="panel-head"><div class="panel-title">Periode EoTQ</div><div class="panel-count" id="cycle-count">0 periode</div></div>
        <div class="panel-body"><div class="cycle-list" id="cycle-list"></div></div>
      </aside>
      <section class="panel">
        <div class="panel-head"><div class="panel-title">Pengaturan</div><div class="panel-count" id="detail-state">Pilih periode</div></div>
        <div class="panel-body" id="detail"></div>
      </section>
    </section>
  </main>
</div>

<script src="config.js"></script>
<script src="9201-shared.js"></script>
<script src="9201-avatar.js"></script>
<script src="9201-topbar.js"></script>
<script src="9201-sidebar.js"></script>
<script src="9201-role-switcher.js"></script>
<script src="9201-notifikasi.js"></script>
<script src="9201-eotq.js"></script>
<script>
'use strict';

let SESSION = null;
let STATE = { cycles: [], employees: [], selectedId: null, bundle: null, editingQuestion: null };
const $ = id => document.getElementById(id);
const clean = v => String(v == null ? '' : v);
const initials = name => clean(name).split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase() || 'PG';

function showAlert(message, type='info'){
  const el = $('alert');
  el.textContent = message;
  el.className = `alert show ${type}`;
}
function clearAlert(){ $('alert').className = 'alert'; $('alert').textContent = ''; }

async function loadAll(selectId){
  clearAlert();
  try{
    const [cycles, employees] = await Promise.all([Eotq9201.loadCycles(), Eotq9201.loadEmployees()]);
    STATE.cycles = cycles || [];
    STATE.employees = employees || [];
    STATE.selectedId = selectId || STATE.selectedId || (STATE.cycles[0] && STATE.cycles[0].id) || null;
    renderCycles();
    if(STATE.selectedId) await selectCycle(STATE.selectedId);
    else renderEmpty();
  }catch(e){
    console.error(e);
    showAlert(`Gagal memuat EoTQ: ${e.message}. Jalankan dulu supabase-eotq.sql di Supabase SQL Editor.`, 'error');
  }
}

function renderCycles(){
  $('cycle-count').textContent = `${STATE.cycles.length} periode`;
  if(!STATE.cycles.length){
    $('cycle-list').innerHTML = '<div class="empty">Belum ada periode EoTQ. Klik tombol Periode Baru untuk memulai.</div>';
    return;
  }
  $('cycle-list').innerHTML = STATE.cycles.map(c => {
    const st = Eotq9201.cycleState(c);
    return `<button class="cycle-card ${String(c.id)===String(STATE.selectedId)?'active':''}" type="button" onclick="selectCycle(${c.id})">
      <div class="cycle-main">${esc(c.title || 'Employee of the Quarter')}</div>
      <div class="cycle-sub">${esc(c.quarter_label || '-')}<br>${esc(Eotq9201.fmtDateTime(c.start_at))} - ${esc(Eotq9201.fmtDateTime(c.end_at))}</div>
      <span class="status ${esc(st.key)}">${esc(st.label)}</span>
    </button>`;
  }).join('');
}

async function selectCycle(id){
  STATE.selectedId = id;
  STATE.editingQuestion = null;
  renderCycles();
  try{
    STATE.bundle = await Eotq9201.loadCycleBundle(id);
    renderDetail();
  }catch(e){
    showAlert(`Gagal memuat detail: ${e.message}`, 'error');
  }
}

function renderEmpty(){
  $('detail-state').textContent = 'Belum ada data';
  $('detail').innerHTML = '<div class="empty">Belum ada periode. Buat periode untuk mulai menyusun nominasi dan pertanyaan EoTQ.</div>';
}

function renderDetail(){
  const b = STATE.bundle;
  if(!b || !b.cycle) return renderEmpty();
  const c = b.cycle;
  const st = Eotq9201.cycleState(c);
  $('detail-state').textContent = st.label;
  const ranked = Eotq9201.summarize(b.nominees, b.responses);
  $('detail').innerHTML = `
    <form class="form-section" onsubmit="saveCycle(event)">
      <div class="section-title">Data Periode</div>
      <div class="grid two">
        <div class="field"><label>Nama Periode</label><input class="input" id="cycle-title" value="${esc(c.title || '')}" required></div>
        <div class="field"><label>Label Triwulan</label><input class="input" id="cycle-quarter" value="${esc(c.quarter_label || '')}" placeholder="Triwulan I 2026" required></div>
        <div class="field"><label>Mulai Penilaian</label><input class="input" id="cycle-start" type="datetime-local" value="${esc(Eotq9201.toLocalInputValue(c.start_at))}" required></div>
        <div class="field"><label>Tutup Penilaian</label><input class="input" id="cycle-end" type="datetime-local" value="${esc(Eotq9201.toLocalInputValue(c.end_at))}" required></div>
        <div class="field"><label>Waktu Pengumuman</label><input class="input" id="cycle-announce" type="datetime-local" value="${esc(Eotq9201.toLocalInputValue(c.announce_at))}"><div class="hint">Kosongkan jika pengumuman langsung setelah penilaian ditutup.</div></div>
        <div class="field"><label>Status Admin</label><select class="select" id="cycle-status"><option value="draft">Draft</option><option value="published">Published</option><option value="archived">Archived</option></select></div>
      </div>
      <div class="field" style="margin-top:10px"><label>Deskripsi</label><textarea class="textarea" id="cycle-description" placeholder="Narasi singkat penghargaan">${esc(c.description || '')}</textarea></div>
      <div class="btn-row" style="margin-top:12px"><button class="btn primary" type="submit">Simpan Periode</button><button class="btn danger" type="button" onclick="deleteCycle()">Delete Periode</button></div>
    </form>
    <section class="form-section">
      <div class="section-title">Nominasi Pegawai</div>
      <div class="grid three">
        <div class="field"><label>Pegawai</label><select class="select" id="nominee-select">${employeeOptions()}</select></div>
        <div class="field"><label>Catatan Nominasi</label><input class="input" id="nominee-note" placeholder="Alasan singkat nominasi"></div>
        <div class="field"><label>&nbsp;</label><button class="btn primary" type="button" onclick="addNominee()">Tambah Nominasi</button></div>
      </div>
      <div class="divider"></div>
      ${renderNominees(b.nominees)}
    </section>
    <section class="form-section">
      <div class="section-title">Pertanyaan dan Bobot</div>
      ${renderQuestionForm()}
      <div class="divider"></div>
      ${renderQuestions(b.questions)}
    </section>
    <section class="form-section">
      <div class="section-title">Leaderboard Sementara</div>
      ${renderLeaderboard(ranked)}
    </section>`;
  $('cycle-status').value = c.status || 'draft';
}

function employeeOptions(){
  const used = new Set((STATE.bundle && STATE.bundle.nominees || []).map(n => String(n.pegawai_nip)));
  return '<option value="">Pilih pegawai...</option>' + STATE.employees.map(p => {
    const nip = pegawaiNip(p), name = pegawaiNama(p);
    return `<option value="${esc(nip)}" ${used.has(String(nip))?'disabled':''}>${esc(name)} - ${esc(nip)}</option>`;
  }).join('');
}

function renderNominees(rows){
  if(!rows.length) return '<div class="empty">Belum ada nominasi. Tambahkan pegawai yang akan dinilai seluruh pegawai.</div>';
  return `<div class="nominee-grid">${rows.map(n => `<article class="nominee-card">
    <div class="avatar">${esc(initials(n.pegawai_nama))}</div>
    <div style="min-width:0;flex:1"><div class="nominee-name">${esc(n.pegawai_nama)}</div><div class="nominee-nip">${esc(n.pegawai_nip)}</div>${n.note?`<div class="nominee-note">${esc(n.note)}</div>`:''}</div>
    <div class="nominee-actions"><button class="icon-btn" type="button" title="Hapus" onclick="deleteNominee(${n.id})">x</button></div>
  </article>`).join('')}</div>`;
}

function renderQuestionForm(){
  const q = STATE.editingQuestion;
  const types = Eotq9201.QUESTION_TYPES.map(t => `<option value="${t.value}" ${q&&q.type===t.value?'selected':''}>${t.label}</option>`).join('');
  return `<div class="grid two">
    <div class="field"><label>Pertanyaan</label><input class="input" id="question-text" value="${esc(q && q.question || '')}" placeholder="Contoh: Seberapa besar kontribusi pegawai ini?" required></div>
    <div class="field"><label>Tipe Jawaban</label><select class="select" id="question-type">${types}</select></div>
    <div class="field"><label>Bobot Pertanyaan</label><input class="input" id="question-weight" type="number" min="0" step="0.1" value="${esc(q && q.weight != null ? q.weight : 1)}"></div>
    <div class="field"><label>Wajib Diisi</label><select class="select" id="question-required"><option value="true" ${!q || q.required ? 'selected' : ''}>Wajib</option><option value="false" ${q && !q.required ? 'selected' : ''}>Opsional</option></select></div>
  </div>
  <div class="field" style="margin-top:10px"><label>Opsi Jawaban Berbobot</label><textarea class="textarea" id="question-options" placeholder="Untuk pilihan tunggal/ganda. Format: Label|Skor, satu opsi per baris.&#10;Sangat Baik|5&#10;Baik|4">${esc(Eotq9201.optionsToText(q && q.options))}</textarea><div class="hint">Skala 1-5 tidak perlu opsi. Jawaban teks tidak dihitung otomatis.</div></div>
  <div class="btn-row" style="margin-top:10px"><button class="btn primary" type="button" onclick="saveQuestion()">${q?'Update Pertanyaan':'Tambah Pertanyaan'}</button>${q?'<button class="btn" type="button" onclick="cancelQuestionEdit()">Batal Edit</button>':''}</div>`;
}

function renderQuestions(rows){
  if(!rows.length) return '<div class="empty">Belum ada pertanyaan. Buat pertanyaan penilaian seperti Google Form, lengkap dengan bobot.</div>';
  return `<div class="question-list">${rows.map((q, i) => {
    const type = Eotq9201.QUESTION_TYPES.find(t => t.value === q.type);
    const opts = (q.options || []).map(o => `${o.label} (${o.score})`).join(', ');
    return `<article class="question-card">
      <div class="question-top"><div><div class="question-text">${i+1}. ${esc(q.question)}</div><div class="question-meta"><span class="chip">${esc(type ? type.label : q.type)}</span><span class="chip gold">Bobot ${esc(q.weight)}</span><span class="chip">${q.required?'Wajib':'Opsional'}</span></div>${opts?`<div class="question-options">${esc(opts)}</div>`:''}</div>
      <div class="btn-row"><button class="btn" type="button" onclick="editQuestion(${q.id})">Edit</button><button class="btn danger" type="button" onclick="deleteQuestion(${q.id})">Delete</button></div></div>
    </article>`;
  }).join('')}</div>`;
}

function renderLeaderboard(rows){
  if(!rows.length) return '<div class="empty">Leaderboard akan muncul setelah ada nominasi dan penilaian.</div>';
  return `<div class="leaderboard">${rows.slice(0,3).map((r, idx) => `<article class="rank-card">
    <div class="rank-no">#${idx+1}</div><div class="rank-name">${esc(r.nominee.pegawai_nama)}</div><div class="rank-score">${r.average.toFixed(2)} rata-rata dari ${r.votes} penilai</div>
  </article>`).join('')}</div>`;
}

function newCycle(){
  STATE.bundle = { cycle: { id:null, title:'Employee of the Quarter', quarter_label:'Triwulan I 2026', status:'draft' }, nominees:[], questions:[], responses:[] };
  STATE.selectedId = null;
  $('detail-state').textContent = 'Periode Baru';
  renderCycles();
  renderDetail();
}

async function saveCycle(ev){
  ev.preventDefault();
  const payload = {
    title: $('cycle-title').value.trim(),
    quarter_label: $('cycle-quarter').value.trim(),
    description: $('cycle-description').value.trim() || null,
    start_at: Eotq9201.fromLocalInputValue($('cycle-start').value),
    end_at: Eotq9201.fromLocalInputValue($('cycle-end').value),
    announce_at: Eotq9201.fromLocalInputValue($('cycle-announce').value),
    status: $('cycle-status').value,
    created_by: SESSION && SESSION.username,
  };
  if(!payload.title || !payload.quarter_label || !payload.start_at || !payload.end_at) return showAlert('Lengkapi nama, label, dan jadwal periode.', 'error');
  try{
    let rows;
    if(STATE.bundle && STATE.bundle.cycle && STATE.bundle.cycle.id) rows = await Eotq9201.updateCycle(STATE.bundle.cycle.id, payload);
    else rows = await Eotq9201.createCycle(payload);
    const id = rows && rows[0] && rows[0].id;
    showAlert('Periode EoTQ berhasil disimpan.', 'success');
    await loadAll(id || STATE.selectedId);
  }catch(e){ showAlert(`Gagal menyimpan periode: ${e.message}`, 'error'); }
}

async function deleteCycle(){
  const c = STATE.bundle && STATE.bundle.cycle;
  if(!c || !c.id) return renderEmpty();
  if(!confirm(`Hapus periode "${c.title}" beserta semua nominasi, pertanyaan, dan jawaban?`)) return;
  try{ await Eotq9201.deleteCycle(c.id); STATE.selectedId = null; showAlert('Periode dihapus.', 'success'); await loadAll(); }
  catch(e){ showAlert(`Gagal menghapus periode: ${e.message}`, 'error'); }
}

async function addNominee(){
  const cycleId = STATE.bundle && STATE.bundle.cycle && STATE.bundle.cycle.id;
  const nip = $('nominee-select').value;
  if(!cycleId) return showAlert('Simpan periode terlebih dahulu sebelum menambah nominasi.', 'error');
  if(!nip) return showAlert('Pilih pegawai nominasi.', 'error');
  const p = STATE.employees.find(x => String(pegawaiNip(x)) === String(nip));
  try{
    await Eotq9201.addNominee({ cycle_id: cycleId, pegawai_nip: nip, pegawai_nama: pegawaiNama(p), note: $('nominee-note').value.trim() || null, sort_order: STATE.bundle.nominees.length + 1 });
    await selectCycle(cycleId);
  }catch(e){ showAlert(`Gagal menambah nominasi: ${e.message}`, 'error'); }
}

async function deleteNominee(id){
  if(!confirm('Hapus nominasi ini? Jawaban untuk nominasi ini juga akan hilang.')) return;
  try{ await Eotq9201.deleteNominee(id); await selectCycle(STATE.selectedId); }
  catch(e){ showAlert(`Gagal menghapus nominasi: ${e.message}`, 'error'); }
}

async function saveQuestion(){
  const cycleId = STATE.bundle && STATE.bundle.cycle && STATE.bundle.cycle.id;
  if(!cycleId) return showAlert('Simpan periode terlebih dahulu sebelum menambah pertanyaan.', 'error');
  const type = $('question-type').value;
  const payload = {
    cycle_id: cycleId,
    question: $('question-text').value.trim(),
    type,
    required: $('question-required').value === 'true',
    weight: Number($('question-weight').value || 1),
    options: ['single','multi'].includes(type) ? Eotq9201.parseOptions($('question-options').value) : [],
    sort_order: STATE.editingQuestion ? STATE.editingQuestion.sort_order : STATE.bundle.questions.length + 1,
  };
  if(!payload.question) return showAlert('Isi teks pertanyaan.', 'error');
  if(['single','multi'].includes(type) && !payload.options.length) return showAlert('Tipe pilihan butuh opsi jawaban berbobot.', 'error');
  try{
    if(STATE.editingQuestion) await Eotq9201.updateQuestion(STATE.editingQuestion.id, payload);
    else await Eotq9201.addQuestion(payload);
    STATE.editingQuestion = null;
    await selectCycle(cycleId);
  }catch(e){ showAlert(`Gagal menyimpan pertanyaan: ${e.message}`, 'error'); }
}
function editQuestion(id){ STATE.editingQuestion = STATE.bundle.questions.find(q => String(q.id) === String(id)); renderDetail(); }
function cancelQuestionEdit(){ STATE.editingQuestion = null; renderDetail(); }
async function deleteQuestion(id){
  if(!confirm('Hapus pertanyaan ini? Jawaban historis tetap tersimpan sebagai JSON, tetapi form baru tidak menampilkan pertanyaan ini.')) return;
  try{ await Eotq9201.deleteQuestion(id); await selectCycle(STATE.selectedId); }
  catch(e){ showAlert(`Gagal menghapus pertanyaan: ${e.message}`, 'error'); }
}

async function init(){
  let session = novaCheckSession({ requireAdmin:true });
  if(!session) return;
  session = await novaVerifyAdminSession(session);
  if(!session) return;
  SESSION = session;
  if(window.Topbar9201) Topbar9201.setUser(session);
  initRoleSwitcher(session, true);
  await loadAll();
}
if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
</script>
